# MiniRedis production-oriented sample config.
# Put secrets in /etc/miniredis/miniredis.env instead of this file.

bind = 127.0.0.1
port = 6366
stats_bind = 127.0.0.1
stats_port = 8080

log_level = info
log_file = /var/log/miniredis/miniredis.log

snapshot_file = /var/lib/miniredis/snapshot.dat
snapshot_interval = 300
appendonly_file = /var/lib/miniredis/appendonly.aof
appendfsync = everysec

max_request_bytes = 16777216
max_key_bytes = 4096
max_value_bytes = 16777216
max_pipeline_commands = 1024
client_output_buffer_limit = 33554432
max_clients = 10000
io_threads = 4
cache_shards = 16
maxmemory = 536870912
eviction_policy = lru

slowlog_log_slower_than_us = 10000
slowlog_max_len = 256

cluster = false
enable_node_discovery = false
cluster_heartbeat = 2
cluster_fail_threshold = 3
cluster_config_file = /var/lib/miniredis/cluster.conf
