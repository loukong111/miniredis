# MiniRedis sample config.
# Precedence: defaults < config file < environment variables < command line.

bind = 127.0.0.1
port = 6366
stats_bind = 127.0.0.1
stats_port = 8080

log_level = info
# log_file = build/miniredis.log

snapshot_file = build/snapshot_6366.dat
snapshot_interval = 30
# appendonly_file = build/appendonly_6366.aof
appendfsync = everysec

# replicaof = 127.0.0.1:6366
# replicas = 127.0.0.1:6367
replication_backlog_size = 10000
replication_sync_interval_ms = 1000
replication_reconnect_delay_ms = 500

# requirepass = change-me
# ACL users can be written as user:password:role or user password=... role=...
# acl_user = admin:adminpass:admin
# user = app password=apppass role=readwrite
# user = auditor password=auditpass role=readonly
max_request_bytes = 16777216
max_key_bytes = 4096
max_value_bytes = 16777216
max_pipeline_commands = 1024
client_output_buffer_limit = 33554432
max_clients = 10000
io_threads = 4
cache_shards = 16
maxmemory = 0
eviction_policy = noeviction

slowlog_log_slower_than_us = 10000
slowlog_max_len = 128

cluster = false
enable_node_discovery = false
cluster_heartbeat = 2
cluster_fail_threshold = 3
# node_addr = 127.0.0.1:6366
# nodes = 127.0.0.1:6366,127.0.0.1:6367,127.0.0.1:6368

mysql_host = 127.0.0.1
mysql_user = miniredis
# mysql_pass =
mysql_db = miniredis
mysql_port = 3306
