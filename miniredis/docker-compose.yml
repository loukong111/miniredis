services:
  miniredis:
    build:
      context: .
    image: miniredis:latest
    ports:
      - "127.0.0.1:6366:6366"
      - "127.0.0.1:8080:8080"
    environment:
      MINIREDIS_REQUIREPASS: ${MINIREDIS_REQUIREPASS:-change-me}
      MINIREDIS_MAX_CLIENTS: "10000"
    volumes:
      - miniredis-data:/var/lib/miniredis
    command:
      - --bind
      - 0.0.0.0
      - --port
      - "6366"
      - --stats-bind
      - 0.0.0.0
      - --stats-port
      - "8080"
      - --snapshot-file
      - /var/lib/miniredis/snapshot_6366.dat
      - --snapshot-interval
      - "30"
      - --max-clients
      - "10000"
      - --io-threads
      - "4"
      - --cache-shards
      - "16"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  miniredis-data:
