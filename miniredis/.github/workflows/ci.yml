name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  release-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            curl \
            redis-tools

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DMINIREDIS_BUILD_QT_CONSOLE=OFF \
            -DMINIREDIS_ENABLE_INTEGRATION_TESTS=ON

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Recovery / soak smoke
        run: REQUESTS=1000 CLIENTS=5 scripts/recovery_soak.sh

  sanitizer-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake

      - name: Configure ASan UBSan
        run: |
          cmake -S . -B build-sanitize \
            -DCMAKE_BUILD_TYPE=Debug \
            -DMINIREDIS_BUILD_QT_CONSOLE=OFF \
            -DMINIREDIS_ENABLE_INTEGRATION_TESTS=OFF \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build ASan UBSan
        run: cmake --build build-sanitize -j"$(nproc)"

      - name: Unit tests under sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ./build-sanitize/miniredis_unit_tests

  docker-build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker build
        run: docker build -t miniredis:ci .

  platform-boundary:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake

      - name: Check platform build boundary
        run: scripts/check_platform_build.sh
